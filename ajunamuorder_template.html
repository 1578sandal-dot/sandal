<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .delivery-pattern {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .pattern-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 12px 10px;
            flex: 1;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            white-space: nowrap;
        }

        .pattern-option:hover {
            border-color: #667eea;
        }

        .pattern-option input:checked + span {
            color: #667eea;
            font-weight: bold;
        }

        .pattern-option:has(input:checked) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .day-checkbox {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-right: 5px;
            cursor: pointer;
        }

        .day-checkbox:has(input:checked) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        /* 날짜별 메뉴 선택 스타일 */
        .date-menu-container {
            margin-top: 20px;
        }

        .date-menu-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
        }

        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .date-label {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95em;
        }

        .date-day {
            color: #666;
            font-size: 0.9em;
        }

        .menu-row {
            display: grid;
            grid-template-columns: 1fr 1fr 100px 80px;
            gap: 10px;
            align-items: end;
        }

        .menu-image-container {
            margin-top: 10px;
            text-align: center;
        }

        .menu-image {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        .no-image {
            color: #999;
            font-size: 0.9em;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .add-menu-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .add-menu-btn:hover {
            background: #218838;
        }

        .remove-menu-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .remove-menu-btn:hover {
            background: #cc0000;
        }

        .summary {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.1em;
        }

        .summary-row.total {
            border-top: 2px solid #333;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: bold;
            font-size: 1.3em;
            color: #667eea;
        }

        .submit-btn {

            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;

        }

        .submit-btn:hover {

            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

            .grid-2 {

            }

                padding: 20px;
            }

                flex-direction: column;
            }

            .menu-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                    </label>
                    <label class="pattern-option">

                    <label class="day-checkbox"><input type="checkbox" value="4"> 목</label>
                    <label class="day-checkbox"><input type="checkbox" value="5"> 금</label>

            </div>

            <div id="dateMenuContainer" class="date-menu-container">

                </div>
            </div>
        </div>

        <!-- 합계 -->
        <div class="summary">
            <div class="summary-row">
                <span>총 배송일:</span>
                <span id="totalDays">0일</span>
            </div>
            <div class="summary-row">
                <span>소계:</span>
                <span id="subtotal">0원</span>
            </div>
            <div class="summary-row">

            </div>
            <div class="summary-row total">

                <span id="total">0원</span>
            </div>
        </div>

        <button class="submit-btn" onclick="submitOrder()">발주서 제출</button>
    </div>

        // 페이지 로드 시 이벤트 설정
        window.onload = function() {
            // 배송 패턴 라디오 버튼 이벤트
            document.querySelectorAll('input[name="deliveryPattern"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const customDays = document.getElementById('customDays');
                    if (this.value === 'custom') {
                        customDays.style.display = 'block';
                    } else {

        // 배송일 생성
        function generateDeliveryDates() {
            const startDate = document.getElementById('deliveryStartDate').value;
            const endDate = document.getElementById('deliveryEndDate').value;
            const patternRadio = document.querySelector('input[name="deliveryPattern"]:checked');

            if (!startDate || !endDate) {
                alert('배송 시작일과 종료일을 선택해주세요.');
                return;
            }

            if (!patternRadio) {
                alert('배송 주기를 선택해주세요.');
                return;
            }

            if (startDate > endDate) {
                alert('종료일은 시작일보다 이후여야 합니다.');
                return;
            }

            const pattern = patternRadio.value;
            let allowedDays = [];

            if (pattern === 'everyday') {
                allowedDays = [1, 2, 3, 4, 5]; // 월~금
            } else if (pattern === 'mwf') {
                allowedDays = [1, 3, 5]; // 월, 수, 금
            } else if (pattern === 'tt') {
                allowedDays = [2, 4]; // 화, 목
            } else if (pattern === 'mon') {
                allowedDays = [1]; // 월
            } else if (pattern === 'custom') {
                const checkedDays = document.querySelectorAll('#customDays input:checked');
                if (checkedDays.length === 0) {
                    alert('배송 요일을 선택해주세요.');
                    return;
                }
                allowedDays = Array.from(checkedDays).map(cb => parseInt(cb.value));
            }

            // 배송일 계산
            deliveryDates = [];
            let current = new Date(startDate);
            const end = new Date(endDate);

            while (current <= end) {
                const dayOfWeek = current.getDay();
                if (allowedDays.includes(dayOfWeek)) {
                    deliveryDates.push(new Date(current));
                }
                current.setDate(current.getDate() + 1);
            }

            if (deliveryDates.length === 0) {
                alert('선택한 기간과 배송 주기에 해당하는 배송일이 없습니다.');
                return;
            }

            // UI 생성
            renderDateMenuItems();
        }

        // 날짜별 메뉴 선택 UI 생성
        function renderDateMenuItems() {
            const container = document.getElementById('dateMenuContainer');
            container.innerHTML = '';
            menuCounters = {};

            deliveryDates.forEach((date, index) => {
                const dateStr = formatDate(date);
                const dayName = dayNames[date.getDay()];
                menuCounters[dateStr] = 1;

                const dateItem = document.createElement('div');
                dateItem.className = 'date-menu-item';
                dateItem.id = `date-${dateStr}`;

                dateItem.innerHTML = `
                    <div class="date-header">
                        <span class="date-label">${dateStr} (${dayName})</span>
                        <span class="date-day">${index + 1}일차</span>
                    </div>
                    <div id="menus-${dateStr}">
                        ${createMenuRow(dateStr, 1)}
                    </div>
                    <button class="add-menu-btn" onclick="addMenuToDate('${dateStr}')">+ 메뉴 추가</button>
                `;

                container.appendChild(dateItem);
            });

            document.getElementById('totalDays').textContent = deliveryDates.length + '일';
            calculateTotal();
        }

        // 메뉴 선택 행 생성
        function createMenuRow(dateStr, menuNum) {
            const categoryOptions = Object.keys(menuData).map(cat =>
                `<option value="${cat}">${cat}</option>`
            ).join('');

            return `
                <div class="menu-row" id="menu-row-${dateStr}-${menuNum}">
                    <div class="form-group">
                        <label>카테고리</label>
                        <select id="category-${dateStr}-${menuNum}" onchange="updateMenuOptions('${dateStr}', ${menuNum})">
                            <option value="">선택</option>
                            ${categoryOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>메뉴</label>
                        <select id="menu-${dateStr}-${menuNum}" onchange="updateDatePrice('${dateStr}', ${menuNum})" disabled>
                            <option value="">카테고리 선택</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>수량</label>
                        <input type="number" id="quantity-${dateStr}-${menuNum}" min="1" value="1" onchange="updateDatePrice('${dateStr}', ${menuNum})">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        ${menuNum > 1 ? `<button class="remove-menu-btn" onclick="removeMenuFromDate('${dateStr}', ${menuNum})">삭제</button>` : ''}
                    </div>
                </div>
                <div class="menu-image-container" id="imageContainer-${dateStr}-${menuNum}">
                    <img class="menu-image" id="menuImage-${dateStr}-${menuNum}" style="display: none;">
                    <div class="no-image" id="noImage-${dateStr}-${menuNum}">이미지 없음</div>
                </div>
            `;
        }

        // 날짜에 메뉴 추가
        function addMenuToDate(dateStr) {
            menuCounters[dateStr]++;
            const menuNum = menuCounters[dateStr];
            const menusContainer = document.getElementById(`menus-${dateStr}`);
            const newMenuHtml = createMenuRow(dateStr, menuNum);
            menusContainer.insertAdjacentHTML('beforeend', newMenuHtml);
        }

        // 날짜에서 메뉴 삭제
        function removeMenuFromDate(dateStr, menuNum) {
            const menuRow = document.getElementById(`menu-row-${dateStr}-${menuNum}`);
            const imageContainer = document.getElementById(`imageContainer-${dateStr}-${menuNum}`);
            if (menuRow) menuRow.remove();
            if (imageContainer) imageContainer.remove();
            calculateTotal();
        }

        // 메뉴 옵션 업데이트
        function updateMenuOptions(dateStr, menuNum) {
            const category = document.getElementById(`category-${dateStr}-${menuNum}`).value;
            const menuSelect = document.getElementById(`menu-${dateStr}-${menuNum}`);

            menuSelect.innerHTML = '<option value="">선택</option>';

            if (category && menuData[category]) {
                menuSelect.disabled = false;
                menuData[category].forEach(item => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify(item);
                    option.textContent = item.name;
                    menuSelect.appendChild(option);
                });
            } else {
                menuSelect.disabled = true;
            }

            updateDatePrice(dateStr, menuNum);
        }

        // 가격 업데이트 및 이미지 표시
        function updateDatePrice(dateStr, menuNum) {
            const menuSelect = document.getElementById(`menu-${dateStr}-${menuNum}`);
            const menuImage = document.getElementById(`menuImage-${dateStr}-${menuNum}`);
            const noImage = document.getElementById(`noImage-${dateStr}-${menuNum}`);

            if (menuSelect && menuSelect.value) {
                const menuItem = JSON.parse(menuSelect.value);

                // 이미지 표시
                const imageName = getImageName(menuItem.name);
                if (imageName) {
                    menuImage.style.display = 'block';
                    noImage.style.display = 'none';
                    tryLoadImage(menuImage, imageName, noImage);
                } else {
                    menuImage.style.display = 'none';
                    noImage.style.display = 'block';
                }
            } else {
                if (menuImage) menuImage.style.display = 'none';
                if (noImage) noImage.style.display = 'none';
            }

            calculateTotal();
        }

        // 메뉴명을 이미지 파일명으로 변환
        function getImageName(menuName) {
            let imageName = menuName
                .replace(/ 1p/g, '1피스')
                .replace(/ 2p/g, '2피스')
                .replace(/ 4p/g, '4피스')
                .replace(/ 6p/g, '6피스')
                .replace(/ /g, '');
            return imageName;
        }

        // 이미지 로드 시도
        function tryLoadImage(imgElement, baseName, noImageElement) {
            const extensions = ['.jpg', '.png', '.JPG', '.PNG'];
            let currentIndex = 0;

            function tryNext() {
                if (currentIndex < extensions.length) {
                    imgElement.src = `images/${baseName}${extensions[currentIndex]}`;
                    currentIndex++;
                } else {
                    imgElement.style.display = 'none';
                    noImageElement.style.display = 'block';
                }
            }

            imgElement.onerror = tryNext;
            tryNext();
        }

        // 날짜 포맷
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 전체 합계 계산
        function calculateTotal() {
            let subtotal = 0;

            deliveryDates.forEach(date => {
                const dateStr = formatDate(date);
                const maxMenuNum = menuCounters[dateStr] || 1;

                for (let i = 1; i <= maxMenuNum; i++) {
                    const menuSelect = document.getElementById(`menu-${dateStr}-${i}`);
                    const quantityInput = document.getElementById(`quantity-${dateStr}-${i}`);

                    if (menuSelect && menuSelect.value && quantityInput) {
                        const menuItem = JSON.parse(menuSelect.value);
                        const quantity = parseInt(quantityInput.value) || 0;
                        subtotal += menuItem.price * quantity;
                    }
                }
            });

            const tax = Math.round(subtotal * 0.1);
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = subtotal.toLocaleString() + '원';
            document.getElementById('tax').textContent = tax.toLocaleString() + '원';
            document.getElementById('total').textContent = total.toLocaleString() + '원';
        }

        // 발주 제출
        function submitOrder() {
            const companyName = document.getElementById('companyName').value;
            const contactName = document.getElementById('contactName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;

            if (!companyName || !contactName || !phone || !email) {
                alert('고객정보를 모두 입력해주세요.');
                return;
            }

            if (deliveryDates.length === 0) {
                alert('배송일을 먼저 생성해주세요.');
                return;
            }

            // 주문 데이터 수집
            const orders = [];
            let hasOrder = false;

            deliveryDates.forEach(date => {
                const dateStr = formatDate(date);
                const dayName = dayNames[date.getDay()];
                const maxMenuNum = menuCounters[dateStr] || 1;

                for (let i = 1; i <= maxMenuNum; i++) {
                    const menuSelect = document.getElementById(`menu-${dateStr}-${i}`);
                    const quantityInput = document.getElementById(`quantity-${dateStr}-${i}`);
                    const categorySelect = document.getElementById(`category-${dateStr}-${i}`);

                    if (menuSelect && menuSelect.value && quantityInput) {
                        hasOrder = true;
                        const menuItem = JSON.parse(menuSelect.value);
                        orders.push({
                            date: dateStr,
                            day: dayName,
                            category: categorySelect ? categorySelect.value : '',
                            menu: menuItem.name,
                            quantity: parseInt(quantityInput.value),
                            price: menuItem.price,
                            total: menuItem.price * parseInt(quantityInput.value)
                        });
                    }
                }
            });

            if (!hasOrder) {
                alert('최소 1개 이상의 메뉴를 선택해주세요.');
                return;
            }

            const orderData = {
                companyName,
                contactName,
                phone,
                email,
                deliveryStartDate: document.getElementById('deliveryStartDate').value,
                deliveryEndDate: document.getElementById('deliveryEndDate').value,
                totalDays: deliveryDates.length,
                orders,
                subtotal: parseInt(document.getElementById('subtotal').textContent.replace(/[^0-9]/g, '')),
                tax: parseInt(document.getElementById('tax').textContent.replace(/[^0-9]/g, '')),
                total: parseInt(document.getElementById('total').textContent.replace(/[^0-9]/g, ''))
            };

            console.log('발주 데이터:', orderData);

            // 구글 시트로 전송
            fetch('https://script.google.com/macros/s/AKfycbw7xMAGKmu4EWiQ4RL8iSEPCiwJK69GpuAb-lcQYw7kBLByH1JaBbCiBWiS767a3s17/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(orderData)
            });

            alert('발주가 접수되었습니다!\n\n담당자가 확인 후 연락드리겠습니다.');
        }
    </script>
</body>
</html>
