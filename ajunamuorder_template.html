<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아주나무 샌달 - 조식 발주서</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .order-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
        }

        .order-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-number {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: #cc0000;
        }

        .add-item-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .add-item-btn:hover {
            background: #218838;
        }

        .summary {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.1em;
        }

        .summary-row.total {
            border-top: 2px solid #333;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: bold;
            font-size: 1.3em;
            color: #667eea;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .delivery-pattern {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .pattern-option {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pattern-option:hover {
            border-color: #667eea;
        }

        .pattern-option input:checked + span {
            color: #667eea;
            font-weight: bold;
        }

        .pattern-option:has(input:checked) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .day-checkbox {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-right: 5px;
            cursor: pointer;
        }

        .day-checkbox:has(input:checked) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .delivery-pattern {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥪 아주나무 샌달</h1>
        <p class="subtitle">조식 발주서</p>

        <!-- 고객정보 -->
        <div class="section">
            <div class="section-title">📋 고객정보</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>회사명 *</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-group">
                    <label>담당자 *</label>
                    <input type="text" id="contactName" required>
                </div>
                <div class="form-group">
                    <label>전화번호 *</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>이메일 *</label>
                    <input type="email" id="email" required>
                </div>
            </div>
        </div>

        <!-- 발주 정보 -->
        <div class="section">
            <div class="section-title">📅 발주 정보</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>배송 시작일 *</label>
                    <input type="date" id="deliveryStartDate" required>
                </div>
                <div class="form-group">
                    <label>배송 종료일 *</label>
                    <input type="date" id="deliveryEndDate" required>
                </div>
            </div>

            <div class="form-group">
                <label>배송 패턴 *</label>
                <div class="delivery-pattern">
                    <label class="pattern-option">
                        <input type="radio" name="deliveryPattern" value="everyday" required>
                        <span>매일 (월~금)</span>
                    </label>
                    <label class="pattern-option">
                        <input type="radio" name="deliveryPattern" value="mwf">
                        <span>월·수·금</span>
                    </label>
                    <label class="pattern-option">
                        <input type="radio" name="deliveryPattern" value="tt">
                        <span>화·목</span>
                    </label>
                    <label class="pattern-option">
                        <input type="radio" name="deliveryPattern" value="mon">
                        <span>월요일만</span>
                    </label>
                    <label class="pattern-option">
                        <input type="radio" name="deliveryPattern" value="custom">
                        <span>직접 선택</span>
                    </label>
                </div>
                <div id="customDays" style="display: none; margin-top: 10px;">
                    <label class="day-checkbox"><input type="checkbox" value="월"> 월</label>
                    <label class="day-checkbox"><input type="checkbox" value="화"> 화</label>
                    <label class="day-checkbox"><input type="checkbox" value="수"> 수</label>
                    <label class="day-checkbox"><input type="checkbox" value="목"> 목</label>
                    <label class="day-checkbox"><input type="checkbox" value="금"> 금</label>
                </div>
            </div>

            <div id="orderItems">
                <!-- 주문 항목들이 여기에 추가됨 -->
            </div>

            <button class="add-item-btn" onclick="addOrderItem()">+ 세트 추가</button>
        </div>

        <!-- 합계 -->
        <div class="summary">
            <div class="summary-row">
                <span>소계:</span>
                <span id="subtotal">0원</span>
            </div>
            <div class="summary-row">
                <span>부가세 (10%):</span>
                <span id="tax">0원</span>
            </div>
            <div class="summary-row total">
                <span>합계:</span>
                <span id="total">0원</span>
            </div>
        </div>

        <button class="submit-btn" onclick="submitOrder()">발주서 제출</button>
    </div>

        let itemCounter = 0;

        // 페이지 로드 시 첫 번째 항목 추가
        window.onload = function() {
            addOrderItem();

            // 배송 패턴 라디오 버튼 이벤트
            document.querySelectorAll('input[name="deliveryPattern"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const customDays = document.getElementById('customDays');
                    if (this.value === 'custom') {
                        customDays.style.display = 'block';
                    } else {
                        customDays.style.display = 'none';
                    }
                });
            });
        };

        function addOrderItem() {
            itemCounter++;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'order-item';
            itemDiv.id = `item-${itemCounter}`;

            itemDiv.innerHTML = `
                <div class="order-item-header">
                    <span class="item-number">세트 ${itemCounter}</span>
                    <button class="remove-btn" onclick="removeOrderItem(${itemCounter})">삭제</button>
                </div>
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="category-${itemCounter}" onchange="updateMenuOptions(${itemCounter})">
                        <option value="">선택하세요</option>
                        ${Object.keys(menuData).map(cat => `<option value="${cat}">${cat}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label>세트명</label>
                    <select id="menu-${itemCounter}" onchange="updatePrice(${itemCounter})" disabled>
                        <option value="">먼저 카테고리를 선택하세요</option>
                    </select>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>수량</label>
                        <input type="number" id="quantity-${itemCounter}" min="1" value="1" onchange="updatePrice(${itemCounter})">
                    </div>
                    <div class="form-group">
                        <label>금액</label>
                        <input type="text" id="price-${itemCounter}" readonly value="0원">
                    </div>
                </div>
            `;

            document.getElementById('orderItems').appendChild(itemDiv);
        }

        function removeOrderItem(id) {
            const item = document.getElementById(`item-${id}`);
            if (item) {
                item.remove();
                calculateTotal();
            }
        }

        function updateMenuOptions(id) {
            const category = document.getElementById(`category-${id}`).value;
            const menuSelect = document.getElementById(`menu-${id}`);

            menuSelect.innerHTML = '<option value="">선택하세요</option>';

            if (category && menuData[category]) {
                menuSelect.disabled = false;
                menuData[category].forEach(item => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify(item);
                    option.textContent = item.name;
                    menuSelect.appendChild(option);
                });
            } else {
                menuSelect.disabled = true;
            }

            updatePrice(id);
        }

        function updatePrice(id) {
            const menuSelect = document.getElementById(`menu-${id}`);
            const quantityInput = document.getElementById(`quantity-${id}`);
            const priceInput = document.getElementById(`price-${id}`);

            if (menuSelect.value) {
                const menuItem = JSON.parse(menuSelect.value);
                const quantity = parseInt(quantityInput.value) || 0;
                const totalPrice = menuItem.price * quantity;
                priceInput.value = totalPrice.toLocaleString() + '원';
            } else {
                priceInput.value = '0원';
            }

            calculateTotal();
        }

        function calculateTotal() {
            let subtotal = 0;

            for (let i = 1; i <= itemCounter; i++) {
                const priceInput = document.getElementById(`price-${i}`);
                if (priceInput) {
                    const price = parseInt(priceInput.value.replace(/[^0-9]/g, '')) || 0;
                    subtotal += price;
                }
            }

            const tax = Math.round(subtotal * 0.1);
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = subtotal.toLocaleString() + '원';
            document.getElementById('tax').textContent = tax.toLocaleString() + '원';
            document.getElementById('total').textContent = total.toLocaleString() + '원';
        }

        function submitOrder() {
            // 필수 항목 체크
            const companyName = document.getElementById('companyName').value;
            const contactName = document.getElementById('contactName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const deliveryStartDate = document.getElementById('deliveryStartDate').value;
            const deliveryEndDate = document.getElementById('deliveryEndDate').value;

            // 배송 패턴 가져오기
            const deliveryPatternRadio = document.querySelector('input[name="deliveryPattern"]:checked');
            if (!deliveryPatternRadio) {
                alert('배송 패턴을 선택해주세요.');
                return;
            }

            let deliveryPattern = deliveryPatternRadio.value;
            let deliveryDays = '';

            if (deliveryPattern === 'everyday') {
                deliveryDays = '월,화,수,목,금';
            } else if (deliveryPattern === 'mwf') {
                deliveryDays = '월,수,금';
            } else if (deliveryPattern === 'tt') {
                deliveryDays = '화,목';
            } else if (deliveryPattern === 'mon') {
                deliveryDays = '월';
            } else if (deliveryPattern === 'custom') {
                const checkedDays = document.querySelectorAll('#customDays input:checked');
                if (checkedDays.length === 0) {
                    alert('배송 요일을 선택해주세요.');
                    return;
                }
                deliveryDays = Array.from(checkedDays).map(cb => cb.value).join(',');
            }

            if (!companyName || !contactName || !phone || !email || !deliveryStartDate || !deliveryEndDate) {
                alert('고객정보와 배송 날짜를 모두 입력해주세요.');
                return;
            }

            if (deliveryStartDate > deliveryEndDate) {
                alert('종료일은 시작일보다 이후여야 합니다.');
                return;
            }

            // 주문 항목 수집
            const orders = [];
            for (let i = 1; i <= itemCounter; i++) {
                const menuSelect = document.getElementById(`menu-${i}`);
                const quantityInput = document.getElementById(`quantity-${i}`);

                if (menuSelect && menuSelect.value) {
                    const menuItem = JSON.parse(menuSelect.value);
                    orders.push({
                        category: document.getElementById(`category-${i}`).value,
                        menu: menuItem.name,
                        quantity: quantityInput.value,
                        price: menuItem.price,
                        total: menuItem.price * parseInt(quantityInput.value)
                    });
                }
            }

            if (orders.length === 0) {
                alert('최소 1개 이상의 세트를 선택해주세요.');
                return;
            }

            const orderData = {
                companyName,
                contactName,
                phone,
                email,
                deliveryStartDate,
                deliveryEndDate,
                deliveryDays,
                orders,
                subtotal: parseInt(document.getElementById('subtotal').textContent.replace(/[^0-9]/g, '')),
                tax: parseInt(document.getElementById('tax').textContent.replace(/[^0-9]/g, '')),
                total: parseInt(document.getElementById('total').textContent.replace(/[^0-9]/g, ''))
            };

            console.log('발주 데이터:', orderData);

            // 구글 시트로 전송
            fetch('https://script.google.com/macros/s/AKfycbw7xMAGKmu4EWiQ4RL8iSEPCiwJK69GpuAb-lcQYw7kBLByH1JaBbCiBWiS767a3s17/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(orderData)
            });

            alert('발주가 접수되었습니다!\n\n담당자가 확인 후 연락드리겠습니다.');
        }
    </script>
</body>
</html>
